name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install and build
        working-directory: "ODI _ waldner"
        env:
          # Project pages are served under /<repo>/ — the app reads this as its Vite base.
          BASE_PATH: /WaldnerSterileFillFinish/
        run: |
          npm install
          npm run build
      - name: SPA fallback for client-side routing
        run: cp "ODI _ waldner/dist/index.html" "ODI _ waldner/dist/404.html"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "ODI _ waldner/dist"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
